    <style>
        /* --- MINIMALIST DESIGN SYSTEM --- */
        :root {
            /* Light Theme (Clean & Flat) */
            --bg-base: #ffffff;
            --bg-surface: #f4f4f5;
            --bg-surface-hover: #e4e4e7;
            --brand-primary: #dc2626;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --border-subtle: #e4e4e7;
            --nav-bg: #ffffff;
            --active-nav: #fef2f2;
            --transition: 0.2s ease-in-out;
        }

        [data-theme="dark"] {
            /* Dark Theme (Pure & Flat) */
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --brand-primary: #ef4444; 
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --border-subtle: #27272a;
            --nav-bg: #09090b;
            --active-nav: #450a0a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* Sleek Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 10px; opacity: 0.3; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            display: flex; height: 100vh; overflow: hidden;
            transition: background-color var(--transition), color var(--transition);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- DESKTOP SIDEBAR --- */
        #desktop-nav {
            width: 260px; background: var(--nav-bg); 
            border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column;
            padding: 32px 0 24px 0; z-index: 100;
        }

        .brand-header { padding: 0 24px 32px 24px; display: flex; align-items: center; gap: 12px; }
        .app-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-subtle); }
        .brand-text { display: flex; flex-direction: column; }
        .brand-name { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
        .brand-sub { font-size: 13px; color: var(--text-secondary); }

        .nav-links { display: flex; flex-direction: column; gap: 4px; padding: 0 16px; flex: 1; }
        .nav-btn {
            display: flex; align-items: center; gap: 12px; background: transparent; color: var(--text-secondary);
            border: none; text-align: left; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; 
            transition: all var(--transition);
        }
        .nav-btn:hover { color: var(--text-primary); background: var(--bg-surface); }
        .nav-btn.active { background: var(--active-nav); color: var(--brand-primary); font-weight: 600; }
        
        .action-container { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
        .btn-action {
            background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-primary);
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; display: flex; justify-content: center; align-items: center; gap: 8px; 
            transition: all var(--transition); font-size: 14px; text-decoration: none;
        }
        .btn-action:hover { background: var(--bg-surface-hover); }
        .btn-youtube { background: var(--brand-primary); color: white; border: none; }
        .btn-youtube:hover { background: #b91c1c; }

        /* --- MAIN VIEWPORT --- */
        #app-main { flex: 1; overflow-y: auto; scroll-behavior: smooth; padding: 48px 64px; position: relative; }
        #content-area { max-width: 900px; margin: 0 auto; transition: opacity var(--transition); display: flex; flex-direction: column; min-height: 100%; }
        #content-area.fade-out { opacity: 0; }

        /* Top Mobile Header */
        .mobile-top-bar { display: none; justify-content: space-between; align-items: center; padding: 16px 24px; margin-bottom: 24px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-base); }
        .mobile-brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 15px; }
        .mobile-brand img { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border-subtle); }
        .theme-toggle-btn { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-primary); width: 36px; height: 36px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .header-content { margin-bottom: 40px; animation: fadeIn 0.4s ease-out forwards; }
        .badge-top { display: inline-block; padding: 4px 12px; background: var(--active-nav); border-radius: 100px; font-size: 12px; font-weight: 600; color: var(--brand-primary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
        h1.page-title { font-size: 40px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.03em; color: var(--text-primary); }
        p.page-desc { font-size: 16px; color: var(--text-secondary); line-height: 1.6; max-width: 60ch; }
        .text-link { color: var(--text-primary); text-decoration: underline; text-decoration-color: var(--brand-primary); text-underline-offset: 4px; transition: color var(--transition); }
        .text-link:hover { color: var(--brand-primary); }

        /* --- CLEAN BENTO GRID --- */
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; grid-auto-flow: dense; }
        
        .bento-card {
            background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px;
            display: flex; flex-direction: column; overflow: hidden;
            transition: border-color var(--transition); 
            animation: fadeIn 0.4s ease-out forwards;
        }
        .bento-card:hover { border-color: var(--text-secondary); }

        /* Form Inputs */
        .form-input { padding: 14px; border-radius: 8px; border: 1px solid var(--border-subtle); background: var(--bg-surface); color: var(--text-primary); font-family: inherit; font-size: 14px; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: var(--brand-primary); }
        .form-btn { padding: 14px; border-radius: 8px; background: var(--brand-primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-size: 14px; }
        .form-btn:hover { opacity: 0.9; }

        @media (min-width: 700px) {
            .span-2-col { grid-column: span 2; }
            .span-2-row { grid-row: span 2; }
        }

        .card-social { align-items: center; justify-content: center; text-align: center; font-size: 15px; font-weight: 600; color: var(--text-primary); text-decoration: none; gap: 12px; flex-direction: row; background: var(--bg-surface); }
        .card-social:hover { background: var(--bg-surface-hover); color: var(--brand-primary); border-color: var(--border-subtle); }
        
        .card-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .card-value { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 8px; letter-spacing: -0.02em; }
        .card-value.accent { color: var(--brand-primary); }

        .media-wrapper { width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; background: var(--bg-surface); position: relative; border: 1px solid var(--border-subtle); }
        .media-wrapper.square { aspect-ratio: 1 / 1; }
        .media-wrapper iframe, .media-wrapper img { width: 100%; height: 100%; border: none; object-fit: cover; }

        .video-meta { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        .video-tag { display: inline-block; padding: 4px 8px; background: var(--bg-surface); border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; width: max-content; }
        .video-title { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .site-footer { margin-top: auto; padding-top: 40px; padding-bottom: 20px; color: var(--text-secondary); font-size: 13px; }

        /* --- MOBILE BOTTOM DOCK --- */
        #mobile-dock { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-base); border-top: 1px solid var(--border-subtle); padding: 12px 24px; z-index: 1000; justify-content: space-between; padding-bottom: env(safe-area-inset-bottom, 12px); }
        .dock-btn { width: 44px; height: 44px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: color var(--transition); }
        .dock-btn.active { color: var(--brand-primary); }

        /* --- RESPONSIVE --- */
        @media (max-width: 800px) {
            body { flex-direction: column; }
            #desktop-nav { display: none; }
            #mobile-dock { display: flex; }
            .mobile-top-bar { display: flex; }
            #app-main { padding: 0 24px 100px 24px; }
            h1.page-title { font-size: 32px; }
            .span-2-col, .span-2-row { grid-column: span 1; grid-row: span 1; }
            .bento-card { padding: 20px; }
        }
    </style>

                                </div>
                            </div>
                            <div class="bento-card">
                                <span class="card-label">Established</span>
                                <div class="card-value">2017</div>
                                <p style="color: var(--text-secondary); font-size: 14px;">July 14th</p>
                            </div>
                            <div class="bento-card">
                                <span class="card-label">Profession</span>
                                <div class="card-value accent">Elec.</div>
                                <p style="color: var(--text-secondary); font-size: 14px;">Electrical Engineer</p>
                            </div>
                        </div>
                    `;
                }
                else if (data.isPlaylists) {
                    html += `<div class="bento-grid">`;
                    ytPlaylists.forEach((pl, i) => {
                        let extraClass = i === 0 ? "span-2-col" : ""; // Make the first playlist take up more space
                        html += `
                            <div class="bento-card ${extraClass}">
                                <div class="media-wrapper">
                                    <iframe src="https://www.youtube-nocookie.com/embed/videoseries?list=${pl.id}" title="${pl.title}" referrerpolicy="strict-origin-when-cross-origin" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>
                                </div>
                                <div class="video-meta">
                                    <span class="video-tag">${pl.tag}</span>
                                    <div class="video-title">${pl.title}</div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                else if (data.isYoutube) {
                    let videosToShow = ytVideos;
                    if (route === 'techie') {
                        videosToShow = ytVideos.filter(vid => vid.tag === "Tech" || vid.tag === "Engineering" || vid.tag === "Deep Dive");
                    }

                    html += `<div class="bento-grid">`;
                    videosToShow.forEach((vid, i) => {
                        let extraClass = i === 0 && route !== 'techie' ? "span-2-col" : "";
                        html += `
                            <div class="bento-card ${extraClass}">
                                <div class="media-wrapper">
                                    <iframe src="https://www.youtube-nocookie.com/embed/${vid.id}?rel=0&modestbranding=1" title="${vid.title}" referrerpolicy="strict-origin-when-cross-origin" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>
                                </div>
                                <div class="video-meta">
                                    <span class="video-tag">${vid.tag}</span>
                                    <div class="video-title">${vid.title}</div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                else if (data.isSocial) {
                    html += `<div class="bento-grid">`;
                    socialLinks.forEach((link) => {
                        html += `<a href="${link.url}" class="bento-card card-social" target="_blank">${link.name} ↗</a>`;
                    });
                    html += `</div>`;
                } 
                else if (data.galleryImages) {
                    html += `<div class="bento-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">`;
                    data.galleryImages.forEach((imgSrc) => { 
                        html += `<div class="bento-card" style="padding: 12px;"><div class="media-wrapper square"><img src="${imgSrc}" loading="lazy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzIyMiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIzMCIgZm9udC13ZWlnaHQ9ImJvbGQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiM3NzciIGR5PSIuM2VtIj5waG90bzwvdGV4dD48L3N2Zz4='"></div></div>`; 
                    });
                    html += `</div>`;
                } 
                else if (data.maps) {
                    html += `<div class="bento-grid">`;
                    
                    html += `
                        <div class="bento-card span-2-col">
                            <span class="card-label">Get In Touch</span>
                            <h2 class="card-value" style="font-size: 24px; margin-bottom: 16px;">Let's Connect</h2>
                            <form style="display: flex; flex-direction: column; gap: 12px;" action="mailto:your_email@example.com" method="POST" enctype="text/plain">
                                <input type="text" name="Name" placeholder="Your Name" class="form-input" required>
                                <input type="email" name="Email" placeholder="Your Email" class="form-input" required>
                                <textarea name="Message" placeholder="Your Message" rows="4" class="form-input" style="resize: vertical;" required></textarea>
                                <button type="submit" class="form-btn">Send Message</button>
                            </form>
                        </div>
                    `;

                    data.maps.forEach((location) => { 
                        html += `<div class="bento-card" style="padding: 12px;">
                                    <div class="media-wrapper square">
                                        <iframe src="https://maps.google.com/maps?q=${location}&t=&z=13&ie=UTF8&iwloc=&output=embed" frameborder="0" allowfullscreen loading="lazy"></iframe>
                                    </div>
                                 </div>`; 
                    });
                    html += `</div>`;
                }

                html += `<div class="site-footer">© ${new Date().getFullYear()} Imagine Creating Book.</div>`;

                contentArea.innerHTML = html;
                document.getElementById('app-main').scrollTop = 0;
                contentArea.classList.remove('fade-out');
            }, 200); 
        }

        initApp();
    </script>
</body>
</html>
